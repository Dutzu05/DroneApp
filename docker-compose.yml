services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: drone_app
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: drone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone -d drone_app"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DRONE_APP_PORT:-5174}:5174"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: drone
      PGPASSWORD: drone
      DRONE_DB_NAME: drone_app
      DRONE_GOOGLE_WEB_CLIENT_ID: ${DRONE_GOOGLE_WEB_CLIENT_ID:-1082596673448-0k7mnlrj1vt9pkrs1vuh8ar68arsj6mt.apps.googleusercontent.com}
      DRONE_ANEXA1_TEMPLATE_PATH: /app/assets/templates/ANEXA1.pdf
      DRONE_RUN_MIGRATIONS: 1
    volumes:
      - app_data:/app/.data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5174/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  airspace-api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "backend.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "${DRONE_AIRSPACE_API_PORT:-8080}:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: drone
      PGPASSWORD: drone
      DRONE_DB_NAME: drone_app
      DRONE_RUN_MIGRATIONS: 1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  airspace-scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: ["python3", "-m", "backend.airspace.ingestion.scheduler"]
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: drone
      PGPASSWORD: drone
      DRONE_DB_NAME: drone_app
      DRONE_RUN_MIGRATIONS: 1

volumes:
  postgres_data:
  app_data:
